<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Pipeline — Odd Pieces</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf7f2; color: #1a1a1a; min-height: 100vh; }

  /* NAV */
  .topnav { background: #fff; border-bottom: 2px solid #1a1a1a; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
  .topnav a { color: #999; text-decoration: none; font-size: 0.82rem; font-weight: 600; }
  .topnav a:hover { color: #1a1a1a; }
  .topnav .sep { color: #ccc; }
  .topnav .current { color: #f97316; font-weight: 800; }

  /* HEADER */
  .header { max-width: 1400px; margin: 0 auto; padding: 28px 28px 16px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
  .header p { color: #999; font-size: 0.82rem; margin-top: 3px; }
  .header-actions { display: flex; gap: 8px; }
  .btn-primary { background: #1a1a1a; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
  .btn-primary:hover { background: #333; }
  .btn-ghost { background: #fff; color: #555; border: 1.5px solid #e0dbd4; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
  .btn-ghost:hover { border-color: #999; }

  /* STATS */
  .stats { max-width: 1400px; margin: 0 auto; display: flex; gap: 10px; padding: 0 28px 20px; flex-wrap: wrap; }
  .stat { background: #fff; border: 1.5px solid #ede8e0; border-radius: 12px; padding: 14px 20px; min-width: 110px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .stat .num { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
  .stat .lbl { font-size: 0.7rem; color: #999; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-top: 2px; }
  .stat.s-all .num { color: #1a1a1a; }
  .stat.s-brief .num { color: #7c3aed; }
  .stat.s-prod .num { color: #2563eb; }
  .stat.s-review .num { color: #d97706; }
  .stat.s-approved .num { color: #16a34a; }
  .stat.s-live .num { color: #dc2626; }

  /* FILTERS */
  .filters { max-width: 1400px; margin: 0 auto; padding: 0 28px 20px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { background: #fff; border: 1.5px solid #ede8e0; color: #999; padding: 6px 14px; border-radius: 99px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .filter-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
  .filter-btn:hover:not(.active) { border-color: #999; color: #333; }

  /* KANBAN */
  .kanban-wrap { max-width: 1400px; margin: 0 auto; padding: 0 28px 48px; }
  .kanban { display: flex; gap: 14px; overflow-x: auto; min-height: 500px; }
  .kanban::-webkit-scrollbar { height: 6px; }
  .kanban::-webkit-scrollbar-track { background: #f0ebe3; border-radius: 3px; }
  .kanban::-webkit-scrollbar-thumb { background: #ccc5bb; border-radius: 3px; }

  .col { flex: 0 0 270px; }
  .col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid; }
  .col-title { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
  .col-count { font-size: 0.72rem; font-weight: 700; background: #f0ebe3; padding: 2px 8px; border-radius: 99px; color: #888; }

  .col-briefing .col-header { border-color: #7c3aed; }
  .col-briefing .col-title { color: #7c3aed; }
  .col-production .col-header { border-color: #2563eb; }
  .col-production .col-title { color: #2563eb; }
  .col-review .col-header { border-color: #d97706; }
  .col-review .col-title { color: #d97706; }
  .col-approved .col-header { border-color: #16a34a; }
  .col-approved .col-title { color: #16a34a; }
  .col-live .col-header { border-color: #dc2626; }
  .col-live .col-title { color: #dc2626; }

  .cards { display: flex; flex-direction: column; gap: 8px; }
  .empty-col { font-size: 0.78rem; color: #ccc; text-align: center; padding: 20px 10px; background: #fff; border: 1.5px dashed #e0dbd4; border-radius: 10px; }

  /* CARD */
  .card { background: #fff; border: 1.5px solid #ede8e0; border-radius: 12px; padding: 14px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .card:hover { border-color: #f97316; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .fmt-tag { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; flex-shrink: 0; }
  .fmt-image { background: #eff6ff; color: #2563eb; }
  .fmt-video { background: #f5f3ff; color: #7c3aed; }
  .fmt-carousel { background: #f0fdf4; color: #16a34a; }
  .card-title { font-size: 0.88rem; font-weight: 700; line-height: 1.3; margin-bottom: 5px; }
  .card-hook { font-size: 0.76rem; color: #888; line-height: 1.4; margin-bottom: 8px; }
  .card-emotion { font-size: 0.72rem; color: #f97316; font-weight: 600; margin-bottom: 8px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
  .card-variants { font-size: 0.7rem; color: #999; }
  .card-variants b { color: #1a1a1a; }
  .assignee-chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip { font-size: 0.68rem; font-weight: 600; background: #f5f0e8; color: #555; padding: 2px 7px; border-radius: 99px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; padding: 20px; }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal { background: #fff; border: 1.5px solid #ede8e0; border-radius: 16px; width: 100%; max-width: 860px; margin: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
  .modal-header { padding: 22px 26px 18px; border-bottom: 1.5px solid #ede8e0; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .modal-header-left { flex: 1; }
  .modal-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .modal-title { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.3px; }
  .status-pill { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
  .pill-briefing { background: #f5f3ff; color: #7c3aed; }
  .pill-production { background: #eff6ff; color: #2563eb; }
  .pill-review { background: #fffbeb; color: #d97706; }
  .pill-approved { background: #f0fdf4; color: #16a34a; }
  .pill-live { background: #fef2f2; color: #dc2626; }
  .modal-sub { font-size: 0.8rem; color: #888; font-style: italic; }
  .modal-close { background: #f5f0e8; border: none; color: #888; font-size: 1rem; cursor: pointer; padding: 6px 10px; border-radius: 8px; flex-shrink: 0; }
  .modal-close:hover { background: #ede8e0; color: #1a1a1a; }

  .modal-body { padding: 24px 26px; }
  .section { margin-bottom: 26px; }
  .section-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #f97316; margin-bottom: 10px; }

  /* CONCEPT GRID */
  .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .meta-cell { background: #faf7f2; border: 1.5px solid #ede8e0; border-radius: 8px; padding: 10px 12px; }
  .meta-cell label { font-size: 0.68rem; color: #999; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700; display: block; margin-bottom: 3px; }
  .meta-cell .val { font-size: 0.85rem; color: #1a1a1a; font-weight: 600; }
  .meta-cell.full { grid-column: 1 / -1; }
  .meta-cell .val.hook { font-style: italic; color: #555; font-weight: 400; }

  /* ASSIGNEES */
  .assignee-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .assignee-chip { display: flex; align-items: center; gap: 6px; background: #f5f0e8; border: 1.5px solid #ede8e0; padding: 6px 12px; border-radius: 99px; font-size: 0.8rem; font-weight: 600; }
  .assignee-chip .role { font-size: 0.68rem; color: #999; font-weight: 600; }
  .add-assignee { background: transparent; border: 1.5px dashed #ccc; color: #999; padding: 6px 12px; border-radius: 99px; font-size: 0.78rem; cursor: pointer; }
  .add-assignee:hover { border-color: #f97316; color: #f97316; }

  /* DESIGNER BRIEF */
  .brief-box { background: #fffbf5; border: 2px solid #fed7aa; border-radius: 12px; padding: 18px 20px; }
  .brief-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .brief-top-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; color: #ea580c; letter-spacing: 0.08em; }
  .copy-brief-btn { background: #1a1a1a; color: #fff; border: none; padding: 7px 14px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .copy-brief-btn:hover { background: #333; }

  .brief-block { margin-bottom: 14px; }
  .brief-block:last-child { margin-bottom: 0; }
  .brief-block h4 { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: #999; margin-bottom: 6px; }

  /* STEP-BY-STEP INSTRUCTIONS */
  .step-list { display: flex; flex-direction: column; gap: 8px; }
  .step { display: flex; gap: 10px; align-items: flex-start; background: #fff; border: 1.5px solid #ede8e0; border-radius: 8px; padding: 10px 12px; }
  .step-num { background: #f97316; color: #fff; font-size: 0.72rem; font-weight: 800; width: 20px; height: 20px; border-radius: 99px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-content { font-size: 0.84rem; color: #1a1a1a; line-height: 1.5; }
  .step-content strong { color: #1a1a1a; }
  .step-content em { color: #888; font-style: normal; font-size: 0.78rem; }

  /* VISUAL EXAMPLE BOX */
  .visual-box { background: #fff; border: 1.5px solid #ede8e0; border-radius: 8px; padding: 12px 14px; }
  .visual-box .vb-label { font-size: 0.68rem; color: #999; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
  .visual-box p { font-size: 0.84rem; color: #333; line-height: 1.5; }
  .visual-zones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
  .zone { background: #faf7f2; border: 1.5px dashed #e0dbd4; border-radius: 6px; padding: 8px 10px; text-align: center; font-size: 0.72rem; color: #888; }
  .zone strong { display: block; color: #1a1a1a; font-size: 0.78rem; margin-bottom: 2px; }

  /* DO/DON'T */
  .do-dont { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .dos, .donts { border-radius: 8px; padding: 10px 12px; }
  .dos { background: #f0fdf4; border: 1.5px solid #bbf7d0; }
  .donts { background: #fef2f2; border: 1.5px solid #fecaca; }
  .dos h5 { color: #16a34a; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .donts h5 { color: #dc2626; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .dos li, .donts li { font-size: 0.8rem; color: #374151; line-height: 1.5; margin-bottom: 3px; padding-left: 4px; }

  /* VARIATIONS TABLE */
  .var-table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; border: 1.5px solid #ede8e0; }
  .var-table thead th { background: #f5f0e8; padding: 9px 12px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #555; text-align: left; border-bottom: 1.5px solid #ede8e0; }
  .var-table tbody td { padding: 10px 12px; font-size: 0.82rem; color: #1a1a1a; border-bottom: 1.5px solid #f5f0e8; vertical-align: top; line-height: 1.4; }
  .var-table tbody tr:last-child td { border-bottom: none; }
  .var-table tbody tr:hover td { background: #fffbf5; }
  .var-num { font-weight: 800; color: #f97316; }
  .var-change { font-size: 0.72rem; background: #f5f0e8; color: #888; padding: 2px 7px; border-radius: 99px; font-weight: 700; }
  .var-what { font-size: 0.8rem; color: #333; }

  /* COPY VARIANTS */
  .copy-variants { display: flex; flex-direction: column; gap: 8px; }
  .copy-card { background: #faf7f2; border: 1.5px solid #ede8e0; border-radius: 10px; padding: 14px; }
  .copy-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .copy-lbl { background: #1a1a1a; color: #fff; font-size: 0.7rem; font-weight: 800; padding: 2px 8px; border-radius: 99px; }
  .copy-angle { font-size: 0.72rem; color: #999; font-weight: 600; }
  .copy-headline { font-size: 0.95rem; font-weight: 800; color: #1a1a1a; margin-bottom: 5px; letter-spacing: -0.2px; }
  .copy-body { font-size: 0.82rem; color: #555; line-height: 1.5; margin-bottom: 6px; }
  .copy-cta { font-size: 0.78rem; color: #16a34a; font-weight: 700; }

  /* LP */
  .lp-row { background: #faf7f2; border: 1.5px solid #ede8e0; border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .lp-url { font-size: 0.85rem; color: #2563eb; font-weight: 600; text-decoration: none; }
  .lp-url:hover { text-decoration: underline; }
  .lp-badge { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
  .lp-ready { background: #f0fdf4; color: #16a34a; }
  .lp-tbd { background: #fffbeb; color: #d97706; }

  /* MODAL ACTIONS */
  .modal-actions { padding: 18px 26px; border-top: 1.5px solid #ede8e0; display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-advance { background: #1a1a1a; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
  .btn-advance:hover { background: #333; }
  .btn-reject { background: transparent; border: 1.5px solid #dc2626; color: #dc2626; padding: 10px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
  .btn-reject:hover { background: #fef2f2; }
  .btn-approve-final { background: #16a34a; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
  .btn-export { background: #fff; border: 1.5px solid #ede8e0; color: #555; padding: 10px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-left: auto; }
  .btn-export:hover { border-color: #999; }

  /* ADD / EDIT MODALS */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.75rem; font-weight: 700; color: #555; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-input, .form-select, .form-textarea { width: 100%; background: #faf7f2; border: 1.5px solid #e0dbd4; border-radius: 8px; color: #1a1a1a; padding: 10px 12px; font-size: 0.88rem; font-family: inherit; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #f97316; background: #fff; }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .header, .stats, .filters, .kanban-wrap { padding-left: 16px; padding-right: 16px; }
    .col { flex: 0 0 240px; }
    .meta-grid { grid-template-columns: 1fr 1fr; }
    .do-dont { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .visual-zones { grid-template-columns: 1fr 1fr; }
  }

  /* ── VISUAL BRIEF ────────────────────────────────────────────────────── */
  .vbrief { display: flex; flex-direction: column; gap: 20px; }

  /* Quick-start top row */
  .vb-top { display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: start; }

  /* Layout canvas diagram */
  .layout-canvas { width: 110px; flex-shrink: 0; }
  .lc-label { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 6px; text-align: center; }
  .lc-frame { border: 2px solid #1a1a1a; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
  .lc-frame.square { width: 110px; height: 110px; }
  .lc-frame.story  { width: 62px;  height: 110px; }
  .lc-zone { display: flex; align-items: center; justify-content: center; font-size: 0.58rem; font-weight: 700; text-align: center; padding: 2px 4px; line-height: 1.2; }
  .lc-zone.z-top  { background: #f0ebe3; color: #888; flex: 1; }
  .lc-zone.z-mid  { background: #fde68a; color: #92400e; flex: 2; border-top: 1.5px solid #1a1a1a; border-bottom: 1.5px solid #1a1a1a; }
  .lc-zone.z-bot  { background: #dbeafe; color: #1e40af; flex: 1; }
  .lc-zone.z-full { background: #fde68a; color: #92400e; flex: 3; }
  .lc-zone.z-cap  { background: #dbeafe; color: #1e40af; flex: 1; }
  .lc-zone.z-end  { background: #dcfce7; color: #166534; flex: 1; }

  /* Goal + key points */
  .vb-goal-card { background: #fffbf5; border: 2px solid #fed7aa; border-radius: 12px; padding: 14px 16px; flex: 1; }
  .vb-goal-label { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #ea580c; margin-bottom: 6px; }
  .vb-goal-text { font-size: 0.88rem; font-weight: 700; color: #1a1a1a; line-height: 1.4; margin-bottom: 10px; }
  .vb-keys { display: flex; flex-direction: column; gap: 5px; }
  .vb-key { font-size: 0.78rem; color: #555; display: flex; gap: 6px; align-items: flex-start; line-height: 1.35; }
  .vb-key::before { content: "→"; color: #f97316; font-weight: 900; flex-shrink: 0; }

  /* Visual tone references */
  .vb-refs { }
  .vb-section-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #999; margin-bottom: 8px; }
  .ref-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .ref-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; }
  .ref-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ref-item .ref-cap { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.55); color: #fff; font-size: 0.6rem; font-weight: 700; padding: 4px 6px; line-height: 1.2; }
  .ref-item.bad img { filter: grayscale(40%) brightness(0.8); }
  .ref-item.bad::after { content: "✗"; position: absolute; top: 5px; right: 7px; color: #f87171; font-size: 1.1rem; font-weight: 900; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
  .ref-item.good::after { content: "✓"; position: absolute; top: 5px; right: 7px; color: #4ade80; font-size: 1.1rem; font-weight: 900; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

  /* Do / Don't visual grid */
  .do-dont-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .dd-card { border-radius: 10px; padding: 10px 12px; display: flex; gap: 8px; align-items: flex-start; }
  .dd-card.do   { background: #f0fdf4; border: 1.5px solid #bbf7d0; }
  .dd-card.dont { background: #fef2f2; border: 1.5px solid #fecaca; }
  .dd-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
  .dd-text { font-size: 0.76rem; color: #333; line-height: 1.4; }

  /* Format thumbnails */
  .fmt-thumbs { display: flex; gap: 10px; flex-wrap: wrap; }
  .fmt-thumb { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .fmt-box { border: 2px solid #1a1a1a; border-radius: 4px; background: #f5f0e8; display: flex; align-items: center; justify-content: center; }
  .fmt-box.sq { width: 44px; height: 44px; }
  .fmt-box.st { width: 25px; height: 44px; }
  .fmt-box.hz { width: 70px; height: 44px; }
  .fmt-box.rect { width: 55px; height: 44px; }
  .fmt-box span { font-size: 0.5rem; color: #888; font-weight: 700; text-align: center; line-height: 1.2; padding: 2px; }
  .fmt-thumb-label { font-size: 0.65rem; color: #555; font-weight: 600; text-align: center; max-width: 70px; }

  /* Spec strip */
  .spec-strip { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }

let activeFilter = 'all';

/* ---- RENDER ---- */
function renderStats() {
  const t = concepts.length;
  const c = s => concepts.filter(x => x.status === s).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat s-all"><div class="num">${t}</div><div class="lbl">Total</div></div>
    <div class="stat s-brief"><div class="num">${c('briefing')}</div><div class="lbl">Brief Ready</div></div>
    <div class="stat s-prod"><div class="num">${c('production')}</div><div class="lbl">Production</div></div>
    <div class="stat s-review"><div class="num">${c('review')}</div><div class="lbl">Review</div></div>
    <div class="stat s-approved"><div class="num">${c('approved')}</div><div class="lbl">Approved</div></div>
    <div class="stat s-live"><div class="num">${c('live')}</div><div class="lbl">Live</div></div>
  `;
}

function fmtTag(f) {
  const map = { image:'🖼 Image', video:'🎬 Video', carousel:'🎠 Carousel' };
  const cls = { image:'fmt-image', video:'fmt-video', carousel:'fmt-carousel' };
  return `<span class="fmt-tag ${cls[f]}">${map[f]}</span>`;
}

function renderKanban() {
  const list = activeFilter === 'all' ? concepts : concepts.filter(c => c.format === activeFilter);
  document.getElementById('kanban').innerHTML = STATUSES.map(s => {
    const cols = list.filter(c => c.status === s);
    const cards = cols.length ? cols.map(c => `
      <div class="card" onclick="openDetail(${c.id})">
        <div class="card-top">${fmtTag(c.format)}</div>
        <div class="card-title">${c.name}</div>
        <div class="card-hook">${c.hook}</div>
        <div class="card-footer">
          <div class="card-variants"><b>${c.variations.length}</b> variations</div>
          <div class="assignee-chips">${c.assignees.map(a => `<span class="chip">${a}</span>`).join('')}</div>
        </div>
      </div>`).join('') : `<div class="empty-col">Nothing here yet</div>`;
    return `<div class="col col-${s}">
      <div class="col-header">
        <div class="col-title">${STATUS_LABELS[s]}</div>
        <div class="col-count">${cols.length}</div>
      </div>
      <div class="cards">${cards}</div>
    </div>`;
  }).join('');
}

    ${varCards}

    \${inspoSection}

    <!-- ── COPY FOR META (media buyer) ────────────────────────────── -->
    <div class="ms-header" style="margin-top:8px"><div class="ms-title">✍️ Copy for Meta — Media Buyer</div><div class="ms-divider"></div></div>
    <div class="copy-context-box">
      <strong>Context:</strong> This is the ${c.format} ad for the <em>${c.name}</em> concept.
      Hook angle: "${c.hook}" — pair each copy variant with the matching variation above.

      <div style="margin-top:10px;padding-top:10px;border-top:1px solid #fed7aa;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span style="font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:#ea580c;">Copy version</span>
        <span style="background:#1a1a1a;color:#fff;font-size:0.75rem;font-weight:700;padding:3px 10px;border-radius:99px;">${c.copyVersion || 'Main Copy V1'}</span>
        <a href="https://docs.google.com/spreadsheets/d/1jPsfruib9krB6ApFsEriBsml7xP7ZW2MPrOOJWeqjP0/edit" target="_blank" style="font-size:0.75rem;font-weight:700;color:#f97316;text-decoration:none;display:flex;align-items:center;gap:4px;">📊 Open Copy Spreadsheet →</a>
      </div>
    </div>


    <!-- ── LANDING PAGE ────────────────────────────────────────────── -->
    <div style="margin-top:14px">${lpSection}</div>
  `;

  const next = STATUSES[STATUSES.indexOf(c.status)+1];
  let acts = '';
  if (next) acts += `<button class="btn-advance" onclick="advanceStatus(${id})">→ Move to ${STATUS_LABELS[next]}</button>`;
  if (c.status !== 'live') acts += `<button class="btn-reject" onclick="rejectConcept(${id})">↩ Needs Rework</button>`;
  acts += `<button class="btn-export" onclick="exportConcept(${id})">📤 Export Brief</button>`;
  document.getElementById('modalActions').innerHTML = acts;

  document.getElementById('detailModal').classList.add('open');
}

function advanceStatus(id) {
  const c = concepts.find(x => x.id === id);
  const i = STATUSES.indexOf(c.status);
  if (i < STATUSES.length-1) { c.status = STATUSES[i+1]; closeModal('detailModal'); renderStats(); renderKanban(); showToast(`Moved to ${STATUS_LABELS[c.status]}`); }
}
function rejectConcept(id) {
  concepts.find(x => x.id === id).status = 'briefing';
  closeModal('detailModal'); renderStats(); renderKanban(); showToast('Sent back for rework');
}

function copyBrief(id) {
  const c = concepts.find(x => x.id === id);
  const b = c.brief;
  let t = `DESIGNER BRIEF: ${c.name}\n${'='.repeat(40)}\n\n`;
  t += `WHAT THIS AD NEEDS TO DO:\n${b.adGoal}\n\n`;
  t += `FILE SPECS:\n${b.imageSize}\n\n`;
  t += `WHAT TO SHOW:\n${b.whatToShow}\n\n`;
  t += `TEXT TO PUT ON THE IMAGE:\n${b.textOnImage}\n\n`;
  t += `TEXT NOT ON THE IMAGE:\n${b.textNOTonImage}\n\n`;
  t += `LAYOUT:\n${b.layout}\n\n`;
  t += `IMAGE ZONES (top to bottom):\n${b.visualZones.map((z,i)=>`${i+1}. ${z}`).join('\n')}\n\n`;
  t += `DO:\n${b.dos.map(d=>`✅ ${d}`).join('\n')}\n\n`;
  t += `DON'T:\n${b.donts.map(d=>`❌ ${d}`).join('\n')}\n\n`;
  t += `VARIATIONS TO CREATE:\n`;
  c.variations.forEach(v => { t += `V${v.num} | ${v.format} | ${v.changes} | Use Copy ${v.copy}\n`; });
  navigator.clipboard.writeText(t).then(() => showToast('Brief copied to clipboard!'));
}

function exportConcept(id) {
  const c = concepts.find(x => x.id === id);
  let t = `CONCEPT: ${c.name}\nStatus: ${STATUS_LABELS[c.status]} | Format: ${c.format}\n\n`;
  t += copyBriefText(c);
  t += `\nCOPY VARIANTS:\n`;
  c.copyVariants.forEach(v => { t += `\n[${v.label} — ${v.angle}]\nHeadline: ${v.headline}\nBody: ${v.body}\nCTA: ${v.cta}\n`; });
  t += `\nLANDING PAGE: ${c.landingPage || 'TBD'}`;
  const blob = new Blob([t], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `brief-${c.name.toLowerCase().replace(/\s+/g,'-')}.txt`;
  a.click();
}
function copyBriefText(c) { const b = c.brief; return `FILE: ${b.imageSize}\nSHOW: ${b.whatToShow}\nTEXT ON IMAGE: ${b.textOnImage}\nNO TEXT: ${b.textNOTonImage}\nLAYOUT: ${b.layout}\n`; }

function exportAll() {
  let t = `ODD PIECES — AD CREATIVE PIPELINE\n${new Date().toLocaleDateString()}\n${'='.repeat(40)}\n\n`;
  concepts.forEach(c => { t += `${c.name} | ${STATUS_LABELS[c.status]} | ${c.format} | ${c.assignees.join(', ')} | ${c.variations.length} variations\n`; });
  const blob = new Blob([t], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'pipeline-export.txt'; a.click();
}

function openAddModal() { document.getElementById('addModal').classList.add('open'); }

function addConcept() {
  const name = document.getElementById('nName').value.trim();
  const hook = document.getElementById('nHook').value.trim();
  if (!name || !hook) { showToast('Name and hook are required', true); return; }
  const assigneesRaw = document.getElementById('nAssigned').value;
  const assignees = assigneesRaw ? assigneesRaw.split(',').map(a => a.trim()).filter(Boolean) : ['TBD'];
  const varCount = parseInt(document.getElementById('nVarCount').value);
  const vars = Array.from({length:varCount}, (_,i) => ({ num:i+1, changes:`Variation ${i+1}`, copy:'A', format:'1080×1080 square' }));
  concepts.push({
    id: Date.now(),
    name, hook,
    format: document.getElementById('nFormat').value,
    status: 'briefing',
    emotion: document.getElementById('nEmotion').value || 'TBD',
    assignees,
    landingPage: document.getElementById('nLP').value || '',
    lpReady: false,
    visualDirection: 'TBD',
    variations: vars,
    brief: { adGoal:'TBD', imageSize:'1080×1080px', whatToShow:'TBD', textOnImage:'TBD', textNOTonImage:'Body copy (Ginny handles this)', layout:'TBD', visualZones:['Top: TBD','Middle: TBD','Bottom: TBD'], dos:['Follow brand guidelines'], donts:['Nothing off-brand'] },
    copyVariants: []
  });
  closeModal('addModal');
  ['nName','nHook','nEmotion','nAssigned','nLP'].forEach(id => document.getElementById(id).value = '');
  renderStats(); renderKanban();
  showToast(`"${name}" added!`);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function filterBy(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderKanban();
}
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = err ? '#dc2626' : '#1a1a1a';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});


function makeLayoutDiagram(c) {
  const fmt = c.format;
  const isStory = fmt === 'video';
  const frameClass = isStory ? 'story' : 'square';
  const zones = c.brief.visualZones || [];

  // Parse top/mid/bottom from zones
  const topZ  = zones[0] || 'Top zone';
  const midZ  = zones[1] || 'Middle zone';
  const botZ  = zones[2] || 'Bottom zone';

  if (fmt === 'carousel') {
    return `<div class="lc-label">Slide layout</div>
      <div style="display:flex;gap:3px">
        ${[1,2,3,4,5].map(n => `<div style="display:flex;flex-direction:column;gap:0;width:19px;">
          <div style="background:#f0ebe3;height:16px;border:1.5px solid #1a1a1a;border-radius:3px 3px 0 0;display:flex;align-items:center;justify-content:center;font-size:0.45rem;color:#888;font-weight:700">${n}</div>
          <div style="background:${n===4?'#fde68a':n===5?'#dcfce7':'#faf7f2'};height:36px;border:1.5px solid #1a1a1a;border-top:0;border-radius:0 0 3px 3px;display:flex;align-items:center;justify-content:center;font-size:0.42rem;color:#555;font-weight:700;text-align:center;padding:1px;">${n===1?'chaos':n===4?'REVEAL':n===5?'CTA':'...'}</div>
        </div>`).join('')}
      </div>`;
  }

  return `<div class="lc-label">${isStory ? '9:16 Story' : '1:1 Square'}</div>
    <div class="lc-frame ${frameClass}">
      <div class="lc-zone z-top">${topZ.split(':')[0] || 'Top'}</div>
      <div class="lc-zone z-mid">${midZ.split(':')[0] || 'Middle — HERO'}</div>
      <div class="lc-zone z-bot">${botZ.split(':')[0] || 'Bottom'}</div>
    </div>`;
}

function makeFormatThumbs(variations) {
  const seen = new Set();
  const fmts = [];
  variations.forEach(v => {
    if (!seen.has(v.format)) { seen.add(v.format); fmts.push(v.format); }
  });
  return fmts.map(f => {
    const isStory = f.includes('1920');
    const isSq = f.includes('1080×1080');
    const isHz = f.includes('1200×628') || f.includes('horizontal');
    const cls = isStory ? 'st' : isSq ? 'sq' : isHz ? 'hz' : 'rect';
    const lbl = isStory ? '1080×1920' : isSq ? '1080×1080' : isHz ? '1200×628' : f.split(' ')[0];
    const name = isStory ? 'Story / Reels' : isSq ? 'Feed Square' : isHz ? 'FB Banner' : 'Other';
    return `<div class="fmt-thumb">
      <div class="fmt-box ${cls}"><span>${lbl}</span></div>
      <div class="fmt-thumb-label">${name}</div>
    </div>`;
  }).join('');
}

function makeRefsHTML(c) {
  if (!c.refs) return '';
  const imgs = c.refs.concat(c.notRefs||[]).map(r => {
    const isBad = r.cap.startsWith('✗');
    return `<div class="ref-item ${isBad?'bad':'good'}">
      <img src="${r.url}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'">
      <div class="ref-cap">${r.cap}</div>
    </div>`;
  }).join('');
  return `<div class="vb-refs">
    <div class="vb-section-label">🎨 Visual tone — aim for this</div>
    <div class="ref-grid">${imgs}</div>
  </div>`;
}

function makeDoDontGrid(dos, donts) {
  const doCards  = dos.map(d  => `<div class="dd-card do"><div class="dd-icon">✅</div><div class="dd-text">${d}</div></div>`).join('');
  const dontCards= donts.map(d => `<div class="dd-card dont"><div class="dd-icon">❌</div><div class="dd-text">${d}</div></div>`).join('');
  return `<div class="do-dont-grid">${doCards}${dontCards}</div>`;
}

renderStats();
renderKanban();
</script>
</body>
</html>
